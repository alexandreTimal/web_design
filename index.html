<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Course homepage - Heading hierarchy example</title>
</head>
<body>
  <header>
    <h1>My course homepage</h1>
    <p>Optional tagline here.</p>
  </header>
  <nav aria-label="Main navigation">
    <ul>
      <li><a href="#">Course site</a></li>
      <li><a href="#">Resources</a></li>
    </ul>
  </nav>
  <main id="main-content">
    <section>
      <h2>About me / Course goals</h2>
      <p>My name is Alexandre Timal, I am studying Computer Science, and one goal for this course is to improve my web development skills.</p>
    </section>
    <section>
      <h2>Photo</h2>
      <img src="images/banner.jpeg" alt="Pilote on motorcycle">
    </section>
  </main>
  <footer>
    <p>Alexandre Timal · Web Design · Spring 2026</p>
  </footer>
</body>
</html>
