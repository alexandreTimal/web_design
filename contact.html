<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Alexandre Timal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header>
    <h1>Contact</h1>
    <p>Get in touch with me using the form below.</p>
  </header>

  <nav aria-label="Main navigation">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="data.html">Projects Data</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main id="main-content">
    <section>
      <h2>Contact form</h2>
      <form method="post" action="#" aria-label="Contact form">
        <fieldset>
          <legend>Your details</legend>

          <label for="name">Full name (required)</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email (required)</label>
          <input type="email" id="email" name="email" required>
        </fieldset>

        <fieldset>
          <legend>Your message</legend>

          <label for="subject">Subject (required)</label>
          <input type="text" id="subject" name="subject" required>

          <label for="message">Message (required)</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </fieldset>

        <fieldset>
          <legend>How did you hear about me?</legend>

          <input type="radio" id="hear-course" name="hear" value="course">
          <label for="hear-course">Course / university</label>

          <input type="radio" id="hear-search" name="hear" value="search">
          <label for="hear-search">Search / web</label>

          <input type="radio" id="hear-friend" name="hear" value="friend">
          <label for="hear-friend">Friend</label>
        </fieldset>

        <button type="submit">Send message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>Alexandre Timal &middot; Web Design &middot; 2026</p>
  </footer>
</body>
</html>
